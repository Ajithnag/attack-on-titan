<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attack on Titans</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  
  <!-- GSAP Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* ==================== INDEX.CSS ==================== */
    html, body { 
      background: #060608; 
    }

    /* ==================== HERO.CSS ==================== */
    :root {
      --void  : #06060a;
      --bone  : #d9d4c8;
      --dust  : #8a8278;
      --red   : #b82020;
      --gold  : #c4a450;
      --white : #f0ece4;

      --f-display : 'Cinzel Decorative', serif;
      --f-cinzel  : 'Cinzel', serif;
      --f-body    : 'IM Fell English', serif;
    }

    .hero {
      height : 600vh; 
      position: relative;
    }

    .hero__sticky {
      position : sticky;
      top      : 0;
      width    : 100vw;
      height   : 100vh;
      overflow : hidden;
      background: var(--void);
    }

    .hero__video {
      position   : absolute;
      inset      : 0;
      width      : 100%;
      height     : 100%;
      object-fit : cover;
      pointer-events: none;
    }

    .hero__overlay {
      position  : absolute;
      inset     : 0;
      background: var(--void);
      opacity   : 0.55;
      z-index   : 1;
      pointer-events: none;
    }

    .hero__grain {
      position : absolute;
      inset    : -30%;
      width    : 160%;
      height   : 160%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'%3E%3C/feTurbulence%3E%3C/filter%3E%3Crect width='200' height='200' fill='%23000' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity  : 0.04;
      z-index  : 2;
      pointer-events: none;
      animation: grain 0.1s steps(1) infinite;
    }
    @keyframes grain {
      0%  { transform: translate(0,0); }
      25% { transform: translate(-2%,3%); }
      50% { transform: translate(3%,-2%); }
      75% { transform: translate(-1%,1%); }
    }

    .hero__chapter {
      position  : absolute;
      inset     : 0;
      display   : flex;
      flex-direction: column;
      z-index   : 10;
      pointer-events: none;
    }

    .hero__ch1 {
      justify-content : flex-end;
      padding         : 0 8vw 12vh;
    }

    .hero__eyebrow {
      display    : flex;
      align-items: center;
      gap        : 0.8rem;
      margin-bottom: 1.6rem;
      opacity    : 0.65;
    }
    .hero__rule {
      flex      : 0 0 36px;
      height    : 1px;
      background: var(--gold);
    }
    .hero__eyebrow-txt {
      font-family   : var(--f-cinzel);
      font-size     : clamp(0.5rem, 0.85vw, 0.72rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color         : var(--gold);
    }

    .hero__ch1-title {
      font-family : var(--f-display);
      font-weight : 900;
      font-size   : clamp(2.8rem, 8vw, 9rem);
      line-height : 1.0;
      color       : var(--white);
      text-shadow : 0 0 80px rgba(184,32,32,.5), 0 4px 30px rgba(0,0,0,.8);
      opacity     : 0;   
    }
    .hero__ch1-title em {
      font-style : italic;
      color      : var(--red);
    }
    .hero__ch1-title span {
      display   : block;
      font-size : 0.55em;
      color     : var(--bone);
      font-weight: 400;
      margin-top: 0.15em;
    }

    .hero__ch1-sub {
      font-family : var(--f-body);
      font-style  : italic;
      font-size   : clamp(0.85rem, 1.3vw, 1.15rem);
      color       : var(--dust);
      margin-top  : 1.2rem;
      max-width   : 48ch;
      line-height : 1.7;
      opacity     : 0;
    }

    .hero__ch2 {
      justify-content : center;
      align-items     : center;
      text-align      : center;
    }

    .hero__ch2-title {
      font-family   : var(--f-cinzel);
      font-weight   : 700;
      font-size     : clamp(1.2rem, 3.5vw, 4rem);
      letter-spacing: 0.2em;
      color         : var(--bone);
      text-transform: uppercase;
      text-shadow   : 0 0 100px rgba(184,32,32,.35);
      opacity       : 0;
    }
    .hero__ch2-sub {
      font-family : var(--f-body);
      font-style  : italic;
      font-size   : clamp(0.8rem, 1.2vw, 1.05rem);
      color       : var(--red);
      margin-top  : 1rem;
      letter-spacing: 0.1em;
      opacity     : 0;
    }

    .hero__ch3 {
      justify-content : center;
      padding-left    : 8vw;
    }

    .hero__ch3-title {
      font-family : var(--f-display);
      font-weight : 900;
      font-size   : clamp(4rem, 13vw, 15rem);
      line-height : 0.88;
      color       : var(--white);
      text-shadow : 0 0 160px rgba(196,164,80,.3), 0 8px 60px rgba(0,0,0,.9);
      opacity     : 0;
    }
    .hero__ch3-title span {
      display            : block;
      -webkit-text-stroke: 2px var(--white);
      color              : transparent;
      font-size          : 0.7em;
      text-shadow        : none;
    }

    .hero__ch3-sub {
      font-family  : var(--f-body);
      font-style   : italic;
      font-size    : clamp(0.85rem, 1.4vw, 1.25rem);
      color        : var(--gold);
      margin-top   : 2rem;
      border-left  : 2px solid var(--red);
      padding-left : 1.2rem;
      letter-spacing: 0.08em;
      opacity      : 0;
    }

    .hero__scroll-hint {
      position  : absolute;
      bottom    : 5vh;
      left      : 50%;
      transform : translateX(-50%);
      z-index   : 20;
    }
    .hero__scroll-hint span {
      display   : block;
      width     : 1px;
      height    : 56px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      margin    : auto;
      animation : drop 1.6s ease-in infinite;
    }
    @keyframes drop {
      from { transform: scaleY(0); transform-origin: top; opacity: 1; }
      to   { transform: scaleY(1); transform-origin: top; opacity: 0; }
    }

    @media (max-width: 640px) {
      .hero__ch1, .hero__ch3 { padding-inline: 6vw; }
      .hero__ch3-title span  { -webkit-text-stroke-width: 1px; }
    }

    /* ==================== NAVBAR.CSS ==================== */
    :root {
      --void  : #06060a;
      --ash   : #0e0e13;
      --stone : #1a1a22;
      --smoke : #2e2e3a;
      --dust  : #7a7570;
      --bone  : #d4cfc4;
      --white : #f0ece4;
      --red   : #9b1a1a;
      --red-h : #c0312a;
      --gold  : #c4a450;
      --gold-l: #e0c87a;

      --f-display : 'Cinzel Decorative', serif;
      --f-cinzel  : 'Cinzel', serif;
      --f-body    : 'IM Fell English', serif;

      --nav-h     : 80px;
      --nav-h-sm  : 58px;
    }

    .navbar {
      position        : fixed;
      top             : 0;
      left            : 0;
      right           : 0;
      z-index         : 1000;
      height          : var(--nav-h);
      display         : flex;
      align-items     : center;
      padding         : 0 3vw;
      gap             : 2rem;

      background      : transparent;
      transition      : background 0.5s ease, height 0.4s ease, backdrop-filter 0.5s ease;
    }

    .navbar--scrolled {
      height          : var(--nav-h-sm);
      background      : rgba(6, 6, 10, 0.82);
      backdrop-filter : blur(18px) saturate(160%);
      border-bottom   : 1px solid rgba(196, 164, 80, 0.12);
      box-shadow      : 0 4px 40px rgba(0,0,0,0.6);
    }

    .navbar__rule {
      flex        : 0 0 1px;
      height      : 32px;
      background  : linear-gradient(to bottom, transparent, var(--gold), transparent);
      opacity     : 0.4;
      transition  : opacity 0.4s;
    }
    .navbar--scrolled .navbar__rule { opacity: 0.25; }
    @media (max-width: 900px) { .navbar__rule { display: none; } }

    .navbar__logo {
      display         : flex;
      align-items     : center;
      gap             : 0.55rem;
      text-decoration : none;
      flex-shrink     : 0;
    }

    .navbar__logo-wings {
      font-size   : 1.1rem;
      color       : var(--red);
      line-height : 1;
      transition  : color 0.3s, transform 0.3s;
    }
    .navbar__logo:hover .navbar__logo-wings {
      color     : var(--gold);
      transform : scale(1.15);
    }

    .navbar__logo-text {
      display        : flex;
      flex-direction : column;
      line-height    : 1;
    }
    .navbar__logo-main {
      font-family    : var(--f-display);
      font-weight    : 900;
      font-size      : clamp(0.85rem, 1.3vw, 1.05rem);
      color          : var(--white);
      letter-spacing : 0.06em;
    }
    .navbar__logo-sub {
      font-family    : var(--f-cinzel);
      font-weight    : 400;
      font-size      : clamp(0.5rem, 0.75vw, 0.6rem);
      color          : var(--gold);
      letter-spacing : 0.35em;
      text-transform : uppercase;
      margin-top     : 2px;
    }

    .navbar__links {
      display         : flex;
      align-items     : center;
      gap             : 0;
      list-style      : none;
      margin          : 0 auto;
      padding         : 0;
      position        : relative;
    }

    .navbar__link {
      display         : flex;
      align-items     : center;
      gap             : 0.35rem;
      padding         : 0.5rem 1.1rem;
      font-family     : var(--f-cinzel);
      font-size       : clamp(0.6rem, 0.9vw, 0.75rem);
      font-weight     : 600;
      letter-spacing  : 0.2em;
      text-transform  : uppercase;
      color           : var(--dust);
      text-decoration : none;
      transition      : color 0.25s;
      white-space     : nowrap;
    }
    .navbar__link:hover,
    .navbar__link--active {
      color : var(--bone);
    }

    .navbar__link-num {
      font-family  : var(--f-body);
      font-style   : italic;
      font-size    : 0.65em;
      color        : var(--red);
      margin-right : 2px;
      opacity      : 0.8;
    }

    .navbar__indicator {
      position   : absolute;
      bottom     : -2px;
      left       : 0;
      height     : 1px;
      width      : 0;
      background : linear-gradient(90deg, var(--red), var(--gold));
      opacity    : 0;
      transition : width 0.3s cubic-bezier(.4,0,.2,1),
                   transform 0.3s cubic-bezier(.4,0,.2,1),
                   opacity 0.2s;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .navbar__links { display: none; }
    }

    .navbar__cta {
      position        : relative;
      flex-shrink     : 0;
      text-decoration : none;
      overflow        : hidden;
      border          : 1px solid rgba(155, 26, 26, 0.55);
      padding         : 0.52rem 1.3rem;
      transition      : border-color 0.3s;
    }
    .navbar__cta:hover {
      border-color : var(--red-h);
    }

    .navbar__cta-inner {
      display      : flex;
      align-items  : center;
      gap          : 0.5rem;
      font-family  : var(--f-cinzel);
      font-size    : clamp(0.55rem, 0.85vw, 0.7rem);
      font-weight  : 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color        : var(--bone);
      position     : relative;
      z-index      : 1;
      transition   : color 0.3s;
    }
    .navbar__cta:hover .navbar__cta-inner { color: var(--white); }

    .navbar__cta-bg {
      position   : absolute;
      inset      : 0;
      background : var(--red);
      transform  : translateX(-101%);
      transition : transform 0.35s cubic-bezier(.4,0,.2,1);
      z-index    : 0;
    }
    .navbar__cta:hover .navbar__cta-bg { transform: translateX(0); }

    @media (max-width: 480px) { .navbar__cta { display: none; } }

    .navbar__burger {
      display         : none;
      flex-direction  : column;
      justify-content : center;
      gap             : 5px;
      width           : 36px;
      height          : 36px;
      background      : none;
      border          : none;
      cursor          : pointer;
      padding         : 0;
      margin-left     : auto;
    }
    .navbar__burger span {
      display     : block;
      height      : 1px;
      background  : var(--bone);
      transition  : transform 0.35s cubic-bezier(.4,0,.2,1),
                    opacity 0.3s, width 0.3s;
      transform-origin: center;
    }
    .navbar__burger span:nth-child(1) { width: 100%; }
    .navbar__burger span:nth-child(2) { width: 65%; }
    .navbar__burger span:nth-child(3) { width: 80%; }

    .navbar__burger--open span:nth-child(1) {
      width     : 100%;
      transform : translateY(6px) rotate(45deg);
    }
    .navbar__burger--open span:nth-child(2) {
      opacity   : 0;
      transform : scaleX(0);
    }
    .navbar__burger--open span:nth-child(3) {
      width     : 100%;
      transform : translateY(-6px) rotate(-45deg);
    }

    @media (max-width: 768px) { .navbar__burger { display: flex; } }

    .navbar__drawer {
      position        : fixed;
      inset           : 0;
      z-index         : 999;
      background      : rgba(6, 6, 10, 0.97);
      display         : flex;
      align-items     : center;
      justify-content : center;
      pointer-events  : none;
      opacity         : 0;
      transition      : opacity 0.4s ease;
    }
    .navbar__drawer--open {
      pointer-events : all;
      opacity        : 1;
    }

    .navbar__drawer-inner {
      display        : flex;
      flex-direction : column;
      align-items    : center;
      gap            : 0.4rem;
      width          : 100%;
      padding        : 2rem;
    }

    .navbar__drawer-inner::before {
      content    : '';
      display    : block;
      width      : 60px;
      height     : 1px;
      background : var(--gold);
      opacity    : 0.4;
      margin-bottom: 2rem;
    }

    .navbar__drawer-link {
      display         : flex;
      align-items     : center;
      gap             : 0.8rem;
      font-family     : var(--f-cinzel);
      font-size       : clamp(1.3rem, 5vw, 2rem);
      font-weight     : 700;
      letter-spacing  : 0.15em;
      text-transform  : uppercase;
      color           : var(--dust);
      text-decoration : none;
      padding         : 0.6rem 0;
      width           : 100%;
      justify-content : center;
      border-bottom   : 1px solid rgba(255,255,255,0.05);
      transition      : color 0.25s, letter-spacing 0.3s;

      opacity   : 0;
      transform : translateY(20px);
    }
    .navbar__drawer--open .navbar__drawer-link {
      animation : drawer-in 0.5s cubic-bezier(.2,0,.2,1) forwards;
      animation-delay: calc(var(--i) * 0.07s + 0.1s);
    }
    @keyframes drawer-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .navbar__drawer-link:hover {
      color          : var(--white);
      letter-spacing : 0.25em;
    }

    .navbar__drawer-num {
      font-family  : var(--f-body);
      font-style   : italic;
      font-size    : 0.5em;
      color        : var(--red);
      opacity      : 0.9;
    }

    .navbar__drawer-cta {
      margin-top      : 2.5rem;
      font-family     : var(--f-cinzel);
      font-size       : 0.75rem;
      font-weight     : 600;
      letter-spacing  : 0.3em;
      text-transform  : uppercase;
      color           : var(--white);
      text-decoration : none;
      border          : 1px solid var(--red);
      padding         : 0.9rem 2.8rem;
      transition      : background 0.3s, color 0.3s;

      opacity   : 0;
      transform : translateY(16px);
    }
    .navbar__drawer--open .navbar__drawer-cta {
      animation      : drawer-in 0.5s cubic-bezier(.2,0,.2,1) forwards;
      animation-delay: 0.45s;
    }
    .navbar__drawer-cta:hover {
      background : var(--red);
      color      : var(--white);
    }

    /* ==================== TITANSIZE.CSS ==================== */
    .ts-section {
      position : relative;
    }

    .ts-sticky {
      position   : sticky;
      top        : 0;
      width      : 100vw;
      height     : 100vh;
      overflow   : hidden;
      background : var(--ash);
    }

    .ts-sky {
      position   : absolute;
      inset      : 0;
      background : linear-gradient(
        to bottom,
        #080c14 0%,
        #0f1520 30%,
        #1a1a10 65%,
        #2a1a08 85%,
        #160a04 100%
      );
    }

    .ts-ground {
      position   : absolute;
      bottom     : 0;
      left       : 0;
      right      : 0;
      height     : 12vh;
      background : linear-gradient(to top, #0a0804, #12100a, transparent);
      z-index    : 4;
    }

    .ts-fog {
      position       : absolute;
      inset          : 0;
      background     : radial-gradient(
        ellipse 120% 60% at 50% 100%,
        rgba(200, 180, 140, 0.18) 0%,
        rgba(40, 30, 20, 0.5) 50%,
        transparent 100%
      );
      pointer-events : none;
      z-index        : 3;
    }

    .ts-grain {
      position         : absolute;
      inset            : -20%;
      width            : 140%;
      height           : 140%;
      background-image : url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'%3E%3C/feTurbulence%3E%3C/filter%3E%3Crect width='200' height='200' fill='%23000' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity          : 0.04;
      z-index          : 10;
      pointer-events   : none;
      animation        : grain-ts 0.1s steps(1) infinite;
    }
    @keyframes grain-ts {
      0%  { transform: translate(0, 0); }
      25% { transform: translate(-2%, 3%); }
      75% { transform: translate(2%, -2%); }
    }

    .ts-header {
      position        : absolute;
      top             : 5vh;
      left            : 0;
      right           : 0;
      display         : flex;
      align-items     : center;
      justify-content : center;
      gap             : 2rem;
      z-index         : 8;
      opacity         : 0;
      text-align      : center;
    }
    .ts-header-rule {
      flex       : 0 0 80px;
      height     : 1px;
      background : linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity    : 0.5;
    }
    .ts-header-eyebrow {
      font-family    : var(--f-cinzel);
      font-size      : clamp(0.5rem, 0.9vw, 0.72rem);
      letter-spacing : 0.4em;
      text-transform : uppercase;
      color          : var(--gold);
      opacity        : 0.8;
      margin-bottom  : 0.35rem;
    }
    .ts-header-title {
      font-family    : var(--f-display);
      font-weight    : 900;
      font-size      : clamp(1.1rem, 3vw, 2.6rem);
      color          : var(--white);
      letter-spacing : 0.04em;
      text-shadow    : 0 0 60px rgba(155, 26, 26, 0.4);
    }

    .ts-stage {
      position        : absolute;
      bottom          : 12vh;
      left            : 0;
      right           : 0;
      display         : flex;
      align-items     : flex-end;
      justify-content : center;
      gap             : clamp(0.8rem, 3vw, 4rem);
      padding         : 0 3vw;
      z-index         : 5;
    }

    .ts-titan-slot {
      display        : flex;
      flex-direction : column;
      align-items    : center;
      position       : relative;
      flex-shrink    : 0;
    }

    .ts-figure {
      display         : flex;
      align-items     : flex-end;
      justify-content : center;
      overflow        : visible;
      filter          :
        drop-shadow(0 0 18px color-mix(in srgb, var(--color) 35%, transparent))
        drop-shadow(0 0 60px color-mix(in srgb, var(--color) 15%, transparent));
      transition      : filter 0.4s;
    }
    .ts-figure:hover {
      filter :
        drop-shadow(0 0 30px color-mix(in srgb, var(--color) 65%, transparent))
        drop-shadow(0 0 80px color-mix(in srgb, var(--color) 30%, transparent));
    }

    .ts-figure-img {
      object-fit      : contain;
      object-position : bottom center;
      display         : block;
      user-select     : none;
      -webkit-user-drag : none;
    }

    .ts-measure-line {
      position   : absolute;
      right      : -6px;
      bottom     : 70px;
      width      : 1px;
      background : linear-gradient(to top, var(--color), transparent);
      opacity    : 0.35;
    }
    .ts-measure-line::before {
      content    : '';
      position   : absolute;
      top        : 0;
      left       : -3px;
      width      : 7px;
      height     : 1px;
      background : var(--color);
    }
    .ts-measure-line::after {
      content    : '';
      position   : absolute;
      bottom     : 0;
      left       : -3px;
      width      : 7px;
      height     : 1px;
      background : var(--color);
    }

    .ts-label {
      display        : flex;
      flex-direction : column;
      align-items    : center;
      text-align     : center;
      gap            : 2px;
      margin-top     : 10px;
      opacity        : 0;
      max-width      : clamp(60px, 10vw, 130px);
    }
    .ts-label-height {
      font-family    : var(--f-body);
      font-style     : italic;
      font-size      : clamp(0.5rem, 0.9vw, 0.78rem);
      color          : var(--color);
      letter-spacing : 0.05em;
    }
    .ts-label-name {
      font-family    : var(--f-cinzel);
      font-weight    : 700;
      font-size      : clamp(0.5rem, 0.85vw, 0.72rem);
      letter-spacing : 0.18em;
      text-transform : uppercase;
      color          : var(--bone);
    }
    .ts-label-desc {
      font-family : var(--f-body);
      font-style  : italic;
      font-size   : clamp(0.38rem, 0.65vw, 0.6rem);
      color       : var(--dust);
      line-height : 1.4;
      margin-top  : 3px;
    }
    @media (max-width: 700px) {
      .ts-label-desc { display: none; }
    }

    .ts-wall-line {
      position   : absolute;
      left       : 0;
      right      : 0;
      bottom     : calc(12vh + 45vh);
      height     : 1px;
      background : repeating-linear-gradient(
        90deg,
        rgba(196, 164, 80, 0.25) 0px,
        rgba(196, 164, 80, 0.25) 8px,
        transparent 8px,
        transparent 16px
      );
      z-index    : 6;
    }
    .ts-wall-label {
      position       : absolute;
      right          : 4vw;
      top            : -18px;
      font-family    : var(--f-cinzel);
      font-size      : clamp(0.45rem, 0.75vw, 0.62rem);
      letter-spacing : 0.2em;
      color          : rgba(196, 164, 80, 0.55);
      text-transform : uppercase;
    }

    @media (max-width: 480px) {
      .ts-stage {
        gap    : 0.6rem;
        padding: 0 2vw;
        bottom : 10vh;
      }
      .ts-header { gap: 0.8rem; }
      .ts-header-rule { flex: 0 0 30px; }
    }

    /* Global Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--f-body, serif);
      color: var(--bone);
      background: var(--void);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Register GSAP Plugin
    gsap.registerPlugin(ScrollTrigger);

    // ==================== NAVBAR COMPONENT ====================
    const LINKS = [
      { label: 'Story',    href: '#story'    },
      { label: 'Titans',   href: '#titans'   },
      { label: 'Soldiers', href: '#soldiers' },
      { label: 'Walls',    href: '#walls'    },
      { label: 'Chronicle',href: '#chronicle'},
    ];

    const Navbar = () => {
      const [scrolled, setScrolled] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      const [activeLink, setActiveLink] = useState(null);
      const indicatorRef = useRef(null);
      const linksRef = useRef([]);

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 60);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const moveIndicator = (i) => {
        const el = linksRef.current[i];
        const bar = indicatorRef.current;
        if (!el || !bar) return;
        const rect = el.getBoundingClientRect();
        const parentRect = el.closest('.navbar__links').getBoundingClientRect();
        bar.style.width = `${rect.width}px`;
        bar.style.transform = `translateX(${rect.left - parentRect.left}px)`;
        bar.style.opacity = '1';
      };

      const hideIndicator = () => {
        if (indicatorRef.current) indicatorRef.current.style.opacity = '0';
        setActiveLink(null);
      };

      return (
        <>
          <nav className={`navbar ${scrolled ? 'navbar--scrolled' : ''} ${menuOpen ? 'navbar--open' : ''}`}>
            <div className="navbar__rule navbar__rule--left" />

            <a href="#" className="navbar__logo" onClick={() => setMenuOpen(false)}>
              <span className="navbar__logo-wings">⸸</span>
              <span className="navbar__logo-text">
                <span className="navbar__logo-main">ATTACK</span>
                <span className="navbar__logo-sub">ON TITAN</span>
              </span>
              <span className="navbar__logo-wings">⸸</span>
            </a>

            <ul className="navbar__links" onMouseLeave={hideIndicator}>
              {LINKS.map((link, i) => (
                <li key={link.label}>
                  <a
                    ref={el => linksRef.current[i] = el}
                    href={link.href}
                    className={`navbar__link ${activeLink === i ? 'navbar__link--active' : ''}`}
                    onMouseEnter={() => { setActiveLink(i); moveIndicator(i); }}
                  >
                    <span className="navbar__link-num">0{i + 1}</span>
                    {link.label}
                  </a>
                </li>
              ))}
              <div className="navbar__indicator" ref={indicatorRef} />
            </ul>

            <a href="#watch" className="navbar__cta">
              <span className="navbar__cta-inner">
                <span>Watch Now</span>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </span>
              <span className="navbar__cta-bg" />
            </a>

            <div className="navbar__rule navbar__rule--right" />

            <button
              className={`navbar__burger ${menuOpen ? 'navbar__burger--open' : ''}`}
              onClick={() => setMenuOpen(v => !v)}
              aria-label="Toggle menu"
            >
              <span /><span /><span />
            </button>
          </nav>

          <div className={`navbar__drawer ${menuOpen ? 'navbar__drawer--open' : ''}`}>
            <div className="navbar__drawer-inner">
              {LINKS.map((link, i) => (
                <a
                  key={link.label}
                  href={link.href}
                  className="navbar__drawer-link"
                  style={{ '--i': i }}
                  onClick={() => setMenuOpen(false)}
                >
                  <span className="navbar__drawer-num">0{i + 1}</span>
                  {link.label}
                </a>
              ))}
              <a href="#watch" className="navbar__drawer-cta" onClick={() => setMenuOpen(false)}>
                Watch Now
              </a>
            </div>
          </div>
        </>
      );
    };

    // ==================== HERO COMPONENT ====================
    const Hero = () => {
      const sectionRef = useRef(null);
      const stickyRef = useRef(null);
      const videoRef = useRef(null);

      const ch1TitleRef = useRef(null);
      const ch1SubRef = useRef(null);
      const ch2TitleRef = useRef(null);
      const ch2SubRef = useRef(null);
      const ch3TitleRef = useRef(null);
      const ch3SubRef = useRef(null);
      const overlayRef = useRef(null);

      useEffect(() => {
        const video = videoRef.current;
        const section = sectionRef.current;
        if (!video || !section) return;

        video.pause();
        video.currentTime = 0;

        const setup = () => {
          const duration = video.duration;
          const scrollLen = Math.min(
            Math.max(duration * 150, window.innerHeight * 3),
            window.innerHeight * 8
          );

          section.style.height = `${scrollLen + window.innerHeight}px`;

          ScrollTrigger.create({
            trigger: section,
            start: 'top top',
            end: `+=${scrollLen}`,
            scrub: true,
            onUpdate: (self) => {
              const t = Math.min(self.progress * duration, duration - 0.01);
              if (isFinite(t)) video.currentTime = t;
            },
          });

          const tl = gsap.timeline({
            scrollTrigger: {
              trigger: section,
              start: 'top top',
              end: `+=${scrollLen}`,
              scrub: true,
            },
            defaults: { ease: 'power3.out' },
          });

          tl.fromTo(ch1TitleRef.current,
            { opacity: 0, y: 60, filter: 'blur(12px)' },
            { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.12 },
            0.03);
          tl.fromTo(ch1SubRef.current,
            { opacity: 0, y: 30 },
            { opacity: 1, y: 0, duration: 0.1 },
            0.1);
          tl.to([ch1TitleRef.current, ch1SubRef.current],
            { opacity: 0, y: -40, filter: 'blur(8px)', duration: 0.08 },
            0.24);

          tl.fromTo(ch2TitleRef.current,
            { opacity: 0, letterSpacing: '0.5em', filter: 'blur(18px)' },
            { opacity: 1, letterSpacing: '0.2em', filter: 'blur(0px)', duration: 0.14 },
            0.30);
          tl.fromTo(ch2SubRef.current,
            { opacity: 0, x: -40 },
            { opacity: 1, x: 0, duration: 0.1 },
            0.40);
          tl.to([ch2TitleRef.current, ch2SubRef.current],
            { opacity: 0, y: -30, duration: 0.08 },
            0.58);

          tl.fromTo(overlayRef.current,
            { opacity: 0.55 },
            { opacity: 0.10, duration: 0.15 },
            0.62);

          tl.fromTo(ch3TitleRef.current,
            { opacity: 0, scale: 1.15, filter: 'blur(14px)' },
            { opacity: 1, scale: 1, filter: 'blur(0px)', duration: 0.16 },
            0.68);
          tl.fromTo(ch3SubRef.current,
            { opacity: 0, y: 24 },
            { opacity: 1, y: 0, duration: 0.12 },
            0.80);
        };

        if (video.readyState >= 1) {
          setup();
        } else {
          video.addEventListener('loadedmetadata', setup, { once: true });
        }

        return () => ScrollTrigger.getAll().forEach(t => t.kill());
      }, []);

      return (
        <section className="hero" ref={sectionRef}>
          <div className="hero__sticky" ref={stickyRef}>
            <video
              ref={videoRef}
              className="hero__video"
              src="/vite-project/public/video/one.mp4"
              muted
              playsInline
              preload="auto"
            />

            <div className="hero__overlay" ref={overlayRef} />

            <div className="hero__grain" />

            <div className="hero__chapter hero__ch1">
              <div className="hero__eyebrow">
                <span className="hero__rule" />
                <span className="hero__eyebrow-txt">Year 845 · Wall Maria</span>
                <span className="hero__rule" />
              </div>
              <h1 className="hero__ch1-title" ref={ch1TitleRef}>
                Beyond the <em>Walls</em><br />
                <span>lies the truth</span>
              </h1>
              <p className="hero__ch1-sub" ref={ch1SubRef}>
                Humanity's last refuge — three walls, one consuming dread.
              </p>
            </div>

            <div className="hero__chapter hero__ch2">
              <p className="hero__ch2-title" ref={ch2TitleRef}>SHINGEKI NO KYOJIN</p>
              <p className="hero__ch2-sub" ref={ch2SubRef}>— The day the wall was breached —</p>
            </div>

            <div className="hero__chapter hero__ch3">
              <h2 className="hero__ch3-title" ref={ch3TitleRef}>
                ATTACK<br /><span>ON TITAN</span>
              </h2>
              <p className="hero__ch3-sub" ref={ch3SubRef}>
                Dedicate your heart. Pledge your life.
              </p>
            </div>

            <div className="hero__scroll-hint">
              <span />
            </div>
          </div>
        </section>
      );
    };

    // ==================== TITANSIZE COMPONENT ====================
    const TITANS = [
      {
        id: 'human',
        name: 'Human',
        height: '1.7 m',
        color: '#c4a450',
        desc: 'Survey Corps soldier. The brave ones who dare to face the giants.',
        imgH: 5.8,
        imgW: 5.9,
        img: '/vite-project/public/images/Human.png',
      },
      {
        id: 'pure',
        name: 'Pure Titan',
        height: '4 – 15 m',
        color: '#b0a090',
        desc: 'Mindless and relentless. The most common threat beyond the walls.',
        imgH: 14,
        imgW: 10,
        img: '/vite-project/public/images/PureTitan.png',
      },
      {
        id: 'armored',
        name: 'Armored Titan',
        height: '15 m',
        color: '#8c8c8c',
        desc: 'Reiner Braun. Hardened plates make it nearly impenetrable.',
        imgH: 15.5,
        imgW: 9,
        img: '/vite-project/public/images/ArmoredTitan.png',
      },
      {
        id: 'female',
        name: 'Female Titan',
        height: '14 m',
        color: '#c49090',
        desc: 'Annie Leonhart. Agile, crystalline, and terrifyingly intelligent.',
        imgH: 23.5,
        imgW: 12.5,
        img: '/vite-project/public/images/FemaleTitan.png',
      },
      {
        id: 'beast',
        name: 'Beast Titan',
        height: '17 m',
        color: '#7a8c6a',
        desc: 'Zeke Yeager. Ape-like form with devastating projectile attacks.',
        imgH: 30.5,
        imgW: 18,
        img: '/vite-project/public/images/BeastTitan.png',
      },
      {
        id: 'colossal',
        name: 'Colossal Titan',
        height: '60 m',
        color: '#c0522a',
        desc: 'Bertholdt Hoover. The one who broke the gate. Steam Incarnate.',
        imgH: 50,
        imgW: 28,
        img: '/vite-project/images/col.png',
      },
    ];

    const TitanSize = () => {
      const sectionRef = useRef(null);
      const stickyRef = useRef(null);
      const titanRefs = useRef([]);
      const labelRefs = useRef([]);
      const lineRefs = useRef([]);
      const headerRef = useRef(null);
      const fogRef = useRef(null);

      useEffect(() => {
        const section = sectionRef.current;
        const sticky = stickyRef.current;
        if (!section || !sticky) return;

        const scrollLen = window.innerHeight * (TITANS.length + 1.5);
        section.style.height = `${scrollLen + window.innerHeight}px`;

        const tl = gsap.timeline({
          scrollTrigger: {
            trigger: section,
            start: 'top top',
            end: `+=${scrollLen}`,
            scrub: 1.2,
            pin: sticky,
            pinSpacing: false,
          },
        });

        tl.fromTo(headerRef.current,
          { opacity: 0, y: -30 },
          { opacity: 1, y: 0, duration: 0.4 },
          0);

        TITANS.forEach((_, i) => {
          const el = titanRefs.current[i];
          const label = labelRefs.current[i];
          const line = lineRefs.current[i];
          if (!el) return;

          const start = 0.12 + i * 0.15;

          tl.fromTo(el,
            { yPercent: 110, opacity: 0, filter: 'blur(4px)' },
            { yPercent: 0, opacity: 1, filter: 'blur(0px)', duration: 0.18, ease: 'power3.out' },
            start);

          tl.fromTo([label, line],
            { opacity: 0, y: 10 },
            { opacity: 1, y: 0, duration: 0.1 },
            start + 0.14);
        });

        tl.fromTo(fogRef.current,
          { opacity: 0.9 },
          { opacity: 0.15, duration: 1 },
          0);

        return () => ScrollTrigger.getAll().forEach(t => t.kill());
      }, []);

      return (
        <section className="ts-section" ref={sectionRef}>
          <div className="ts-sticky" ref={stickyRef}>
            <div className="ts-sky" />
            <div className="ts-ground" />
            <div className="ts-fog" ref={fogRef} />

            <div className="ts-header" ref={headerRef}>
              <span className="ts-header-rule" />
              <div>
                <p className="ts-header-eyebrow">Scale of Terror</p>
                <h2 className="ts-header-title">Titan Size Comparison</h2>
              </div>
              <span className="ts-header-rule" />
            </div>

            <div className="ts-stage">
              {TITANS.map((titan, i) => (
                <div
                  key={titan.id}
                  className="ts-titan-slot"
                  style={{ '--color': titan.color }}
                >
                  <div
                    className="ts-figure"
                    ref={el => titanRefs.current[i] = el}
                  >
                    <img
                      src={titan.img}
                      alt={titan.name}
                      className="ts-figure-img"
                      draggable={false}
                      style={{
                        height: `${titan.imgH}vh`,
                        width: `${titan.imgW}vh`,
                      }}
                    />
                  </div>

                  <div
                    className="ts-measure-line"
                    ref={el => lineRefs.current[i] = el}
                    style={{ height: `${titan.imgH}vh` }}
                  />

                  <div
                    className="ts-label"
                    ref={el => labelRefs.current[i] = el}
                  >
                    <span className="ts-label-height">{titan.height}</span>
                    <span className="ts-label-name">{titan.name}</span>
                    <span className="ts-label-desc">{titan.desc}</span>
                  </div>
                </div>
              ))}
            </div>

            <div className="ts-wall-line">
              <span className="ts-wall-label">Wall Maria · 50 m</span>
            </div>

            <div className="ts-grain" />
          </div>
        </section>
      );
    };

    // ==================== APP COMPONENT ====================
    const App = () => {
      return (
        <>
          <Navbar />
          <Hero />
          <TitanSize />
        </>
      );
    };

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
